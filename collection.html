 
 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="collection-grid">

    <div class="card">
        <img src="kanchipuram saree.jpg" alt="Kanchipuram Saree" class="product-img">
        <h3>Kanchipuram Silk</h3>
        <p class="price">₹2499</p>
        <button class="cart-btn" data-name="Kanchipuram Silk" data-price="2499">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

    <div class="card">
        <img src="bridal-lehenga.jpg" alt="Bridal Lehenga" class="product-img">
        <h3>Bridal Lehenga</h3>
        <p class="price">₹3499</p>
        <button class="cart-btn" data-name="Bridal Lehenga" data-price="3499">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

    <div class="card">
        <img src="classic half-saree.jpg" alt="Half Saree" class="product-img">
        <h3>Classy Half Saree</h3>
        <p class="price">₹1299</p>
        <button class="cart-btn" data-name="Classy Half Saree" data-price="1299">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

    <div class="card">
        <img src="cotton-elagance.jpg" alt="Cotton Saree" class="product-img">
        <h3>Cotton Saree</h3>
        <p class="price">₹999</p>
        <button class="cart-btn" data-name="Cotton saree" data-price="999">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

    <div class="card">
        <img src="pearl-necklace.jpg" alt="Pearl Necklace" class="product-img">
        <h3>Pearl Necklace</h3>
        <p class="price">₹699</p>
        <button class="cart-btn" data-name="Pearl Necklace" data-price="699">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

    <div class="card">
        <img src="red crystal-necklace.jpg" alt="Red Crystal Necklace" class="product-img">
        <h3>Red Crystal Necklace</h3>
        <p class="price">₹699</p>
        <button class="cart-btn" data-name="Red Crystal Necklace" data-price="699">
    Add To Cart
</button>
        <button class="wish-btn">❤️ Wishlist</button>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
